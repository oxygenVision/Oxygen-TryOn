<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oxygen-TryOn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Outfit", sans-serif;
      background: #0b1220;
      color: #f4f7fb;
      overflow: hidden;
      position: relative;
    }

    .aurora {
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(ellipse 50% 40% at 20% 30%, rgba(56, 148, 255, 0.35), transparent 60%),
        radial-gradient(ellipse 45% 35% at 80% 70%, rgba(120, 200, 255, 0.22), transparent 55%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(30, 80, 160, 0.25), transparent 50%);
      animation: drift 14s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black, transparent);
      animation: gridPulse 8s ease-in-out infinite;
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      animation: rise 1.1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .brand {
      font-size: clamp(2.4rem, 8vw, 4.8rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    .brand .tryon {
      background: linear-gradient(90deg, #2f7bff, #7ec8ff, #2f7bff);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shimmer 3.5s linear infinite;
    }

    .soon {
      margin-top: 1.25rem;
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(244, 247, 251, 0.72);
      animation: fadeIn 1.2s 0.35s both;
    }

    .bar {
      width: 120px;
      height: 2px;
      margin: 1.75rem auto 0;
      border-radius: 2px;
      background: linear-gradient(90deg, transparent, #5aa6ff, transparent);
      animation: barPulse 2.4s ease-in-out infinite;
    }

    .orb {
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(90, 166, 255, 0.18), transparent 70%);
      filter: blur(8px);
      animation: float 9s ease-in-out infinite;
      pointer-events: none;
    }

    .orb-a { top: 12%; left: 8%; animation-delay: 0s; }
    .orb-b { bottom: 10%; right: 10%; width: 220px; height: 220px; animation-delay: -3s; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(28px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; letter-spacing: 0.55em; }
      to { opacity: 1; letter-spacing: 0.35em; }
    }

    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    @keyframes drift {
      from { transform: translate(-2%, -1%) rotate(0deg); }
      to { transform: translate(2%, 2%) rotate(3deg); }
    }

    @keyframes gridPulse {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 0.8; }
    }

    @keyframes barPulse {
      0%, 100% { opacity: 0.35; transform: scaleX(0.7); }
      50% { opacity: 1; transform: scaleX(1); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-28px); }
    }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <div class="grid"></div>
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <main class="wrap">
    <h1 class="brand">Oxygen <span class="tryon">TryOn</span></h1>
    <p class="soon">Coming Soon</p>
    <div class="bar"></div>
  </main>
</body>
</html>
